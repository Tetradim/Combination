name: combination-live-core-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install complete broker test surface
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,all-brokers]"

      - name: Compile
        run: python -m compileall -q src tests

      - name: Test
        run: python -m pytest
