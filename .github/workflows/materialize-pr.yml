name: materialize-futures-broker-main

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  materialize:
    if: github.event.pull_request.head.ref == 'build/live-only-unified-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify staged archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/small/chunk* > /tmp/combination.b64
          base64 -d /tmp/combination.b64 > /tmp/combination.tar.xz
          echo "ae20d32e60e412fe66d23b569ff4037f801601d802ffc6898218434841d33294  /tmp/combination.tar.xz" | sha256sum -c -

      - name: Extract source tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/combination.tar.xz -C .

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile
        run: python -m compileall -q src tests

      - name: Test instruments
        run: python -m pytest -q tests/test_instruments.py
      - name: Test readiness
        run: python -m pytest -q tests/test_readiness.py
      - name: Test lifecycle
        run: python -m pytest -q tests/test_lifecycle.py
      - name: Test positions
        run: python -m pytest -q tests/test_positions.py
      - name: Test brackets
        run: python -m pytest -q tests/test_brackets.py
      - name: Test fill processor
        run: python -m pytest -q tests/test_fill_processor.py
      - name: Test order gateway
        run: python -m pytest -q tests/test_order_gateway.py
      - name: Test risk
        run: python -m pytest -q tests/test_risk.py

      - name: Test remaining suite
        run: python -m pytest -q tests/test_broker_catalog.py tests/test_registry.py tests/test_config.py tests/test_tastytrade.py tests/test_ccxt_presets.py tests/test_reconciliation.py tests/test_audit_chain.py tests/test_live_risk_hardening.py tests/test_api_auth.py tests/test_reversal_activation.py tests/test_active_bracket_management.py

      - name: Commit complete futures broker build
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add futures brokerages and complete broker registry'
          git push origin HEAD:main
