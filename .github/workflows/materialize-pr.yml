name: materialize-futures-broker-main

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  materialize:
    if: github.event.pull_request.head.ref == 'build/live-only-unified-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild and verify complete source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/small/chunk* > /tmp/combination.b64
          base64 -d /tmp/combination.b64 > /tmp/combination.tar.xz
          echo "ae20d32e60e412fe66d23b569ff4037f801601d802ffc6898218434841d33294  /tmp/combination.tar.xz" | sha256sum -c -
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf /tmp/combination.tar.xz -C .
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m compileall -q src tests
          python -m pytest

      - name: Commit complete futures broker build
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add futures brokerages and complete broker registry'
          git push origin HEAD:main
