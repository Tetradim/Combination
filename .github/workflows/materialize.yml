name: materialize-combination-tree

on:
  push:
    branches: [build/live-only-unified-core]

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify and materialize repository tree
        shell: bash
        run: |
          set -euo pipefail
          test -f .bootstrap/combination-tree.tar.xz
          archive="$(mktemp)"
          cp .bootstrap/combination-tree.tar.xz "$archive"
          echo "42c36c1f932a7c1ceb593b71b839d78a12a6bae9423dd9c1e163498131afbfc9  $archive" | sha256sum -c -
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xJf "$archive" -C .
          rm -f "$archive"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Complete live-only broker testing candidate"
          git push origin HEAD:build/live-only-unified-core
