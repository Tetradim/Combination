name: expanded-public-derivatives-validation

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: read

jobs:
  public-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install complete dependency surface
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -e ".[dev,all-brokers]"

      - name: Verify registered adapter factories
        shell: bash
        run: |
          mkdir -p live-market-v2
          python - <<'PY' | tee live-market-v2/registered-adapters.txt
          from sentinel_combination.brokers.registry import BrokerRegistry
          adapters = BrokerRegistry().adapters
          print(f"count={len(adapters)}")
          for adapter in adapters:
              print(adapter)
          if not adapters:
              raise SystemExit("No broker adapter factories are registered")
          PY

      - name: Run expanded read-only public derivatives validation
        shell: bash
        run: python scripts/live_market_validation_v2.py --output live-market-v2

      - name: Record provenance and checksums
        shell: bash
        run: |
          git rev-parse HEAD > live-market-v2/combination-commit.txt
          sha256sum live-market-v2/live-market-results-v2.json > live-market-v2/live-market-results-v2.sha256

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: expanded-public-derivatives-validation
          path: live-market-v2
          retention-days: 30
